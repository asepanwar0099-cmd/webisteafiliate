<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Daftar - Craft & Gift</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            max-width: 900px;
            width: 100%;
            overflow: hidden;
            padding: 0;
        }
        .auth-image {
            background: url('https://images.unsplash.com/photo-1518199266791-5375a83190b7?auto=format&fit=crop&w=800&q=80') center/cover;
            min-height: 100%;
        }
        .nav-tabs .nav-link {
            color: var(--text-light);
            font-weight: 600;
            border: none;
            border-bottom: 3px solid transparent;
        }
        .nav-tabs .nav-link.active {
            color: var(--primary-color);
            background: transparent;
            border-bottom: 3px solid var(--primary-color);
        }
    </style>
</head>
<body>

    <div class="auth-container animate-fade-up">
        <div class="card glass-panel auth-card">
            <div class="row g-0">
                <div class="col-md-6 d-none d-md-block">
                    <div class="auth-image"></div>
                </div>
                <div class="col-md-6 p-4 p-md-5">
                    <div class="text-center mb-4">
                        <h2 style="color: var(--primary-color);"><i class="fas fa-gift"></i> Craft & Gift</h2>
                        <p class="text-muted">Masuk ke dunia hadiah penuh estetika.</p>
                    </div>

                    <!-- Alert Box -->
                    <div id="authAlert" class="alert d-none" role="alert"></div>

                    <!-- Tabs -->
                    <ul class="nav nav-tabs mb-4 justify-content-center" id="authTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login-pane" type="button" role="tab">Login</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register-pane" type="button" role="tab">Daftar</button>
                        </li>
                    </ul>

                    <div class="tab-content" id="authTabsContent">
                        
                        <!-- LOGIN PANE -->
                        <div class="tab-pane fade show active" id="login-pane" role="tabpanel">
                            <form id="loginForm">
                                <div class="mb-3">
                                    <label class="form-label">Email / No. HP</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                                        <input type="text" class="form-control" id="loginId" required placeholder="Masukkan email atau nomor HP">
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Password</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                        <input type="password" class="form-control" id="loginPassword" required placeholder="Masukkan password">
                                        <span class="input-group-text toggle-password"><i class="fas fa-eye"></i></span>
                                    </div>
                                </div>
                                <div class="d-flex justify-content-between align-items-center mb-4">
                                    <div class="form-check">
                                        <input type="checkbox" class="form-check-input" id="rememberMe">
                                        <label class="form-check-label" for="rememberMe">Ingat Saya</label>
                                    </div>
                                    <a href="#" id="forgotPasswordLink" style="color: var(--primary-color); text-decoration: none; font-size: 0.9rem;">Lupa Password?</a>
                                </div>
                                <button type="submit" class="btn btn-pink w-100">Masuk</button>
                            </form>
                        </div>

                        <!-- REGISTER PANE -->
                        <div class="tab-pane fade" id="register-pane" role="tabpanel">
                            <form id="registerForm">
                                <div class="mb-3">
                                    <label class="form-label">Email / No. HP</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                        <input type="text" class="form-control" id="regId" required placeholder="Gunakan email atau nomor HP aktif">
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Password</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                        <input type="password" class="form-control" id="regPassword" required placeholder="Buat password yang kuat">
                                        <span class="input-group-text toggle-password"><i class="fas fa-eye"></i></span>
                                    </div>
                                </div>
                                <div class="mb-4">
                                    <a href="#" id="toggleAdminCode" style="color: var(--text-light); text-decoration: none; font-size: 0.85rem;"><i class="fas fa-key"></i> Punya Kode Admin? (Opsional)</a>
                                    <div id="adminCodeWrapper" class="mt-2 d-none input-group">
                                        <span class="input-group-text"><i class="fas fa-user-shield"></i></span>
                                        <input type="text" class="form-control" id="regAdminCode" placeholder="Masukkan kode rahasia admin">
                                    </div>
                                </div>
                                <button type="submit" class="btn btn-pink w-100">Daftar Sekarang</button>
                            </form>
                        </div>

                    </div> <!-- End Tab Content -->

                    <div class="text-center mt-4">
                        <a href="index.html" class="text-muted text-decoration-none"><i class="fas fa-arrow-left"></i> Kembali ke Toko</a>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
