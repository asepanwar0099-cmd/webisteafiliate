<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard - Craft & Gift</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .dashboard-container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        
        .inserter-section {
            padding: 2rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        .input-group {
            display: flex;
            gap: 1rem;
            margin: 1.5rem auto;
            max-width: 600px;
        }

        .link-input {
            flex-grow: 1;
            padding: 1rem;
            border: 1px solid var(--card-border);
            border-radius: 8px;
            background: rgba(255,255,255,0.6);
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
        }

        .link-input:focus {
            background: rgba(255,255,255,0.9);
            box-shadow: 0 0 0 2px var(--primary-color);
        }

        .btn-generate {
            padding: 1rem 2rem;
            background: var(--text-dark);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }

        .btn-generate:hover {
            background: #000;
        }

        .preview-section {
            display: none;
            flex-direction: column;
            align-items: center;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--card-border);
        }

        .preview-section.active {
            display: flex;
            animation: fadeInUp 0.5s ease;
        }

        .btn-save {
            margin-top: 1rem;
            padding: 0.8rem 2rem;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-save:hover {
            background: var(--accent-color);
        }

        /* Loading Spinner */
        .loader {
            display: none;
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 4px solid var(--primary-color);
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .search-bar {
            width: 100%;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 1px solid var(--card-border);
            border-radius: 8px;
            background: rgba(255,255,255,0.6);
        }
        
        .manage-section {
            padding: 2rem;
        }

        .action-btns {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .btn-pin {
            padding: 0.5rem 1rem;
            background: #f1c40f;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-pin.pinned {
            background: #e67e22;
            color: white;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">Craft & Gift <span style="font-size:1rem; color:var(--text-light)">| Affiliate Engine</span></a>
        <nav>
            <a href="index.html" style="text-decoration: none; color: var(--text-dark); font-weight: 500;">Lihat Toko</a>
        </nav>
    </header>

    <div class="dashboard-container">
        
        <!-- Link Inserter -->
        <section class="inserter-section glass">
            <h2>Smart Link Inserter</h2>
            <p style="color: var(--text-light); margin-top: 0.5rem;">Paste link produk affiliate (Shopee, dll) di bawah ini untuk menghasilkan Premium Card.</p>
            
            <div class="input-group">
                <input type="text" id="linkInput" class="link-input" placeholder="https://shopee.co.id/...">
                <button class="btn-generate" id="btnGenerate">Generate Card</button>
            </div>
            
            <div class="loader" id="loader"></div>

            <div class="preview-section" id="previewSection">
                <h3 style="margin-bottom: 1rem;">Preview Premium Card</h3>
                <div id="cardPreviewContainer" style="max-width: 300px;"></div>
                <button class="btn-save" id="btnSaveCard">Tambahkan ke Etalase</button>
            </div>
        </section>

        <!-- Product Management -->
        <section class="manage-section glass">
            <h2>Kelola Etalase Produk</h2>
            <input type="text" class="search-bar" id="searchProducts" placeholder="Cari produk di etalase...">
            
            <div class="product-grid" id="sellerProductGrid" style="padding: 1rem 0;">
                <!-- Products list here -->
            </div>
        </section>

    </div>

    <script src="js/seller.js"></script>
</body>
</html>
